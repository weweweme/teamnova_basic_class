<!-- ================================================================
     week14 연습장 - 1단계: HTML만 (뼈대)
     아직 CSS(꾸밈)도 JS(동작)도 없음.
     지금은 "무엇이 있는가"만 있는 상태 = Unity 하이어라키에
     오브젝트만 배치하고 Material도 스크립트도 안 붙인 것과 같음.
     ================================================================ -->

<!-- <!DOCTYPE html> : "이 문서는 HTML5 규칙으로 읽어줘" 라고 브라우저에 알림.
     맨 첫 줄에 딱 한 번 쓴다. (버전 선언 같은 것) -->
<!DOCTYPE html>

<!-- <html> : 페이지 전체를 감싸는 가장 바깥 상자. lang="ko" = 한국어 문서 -->
<html lang="ko">

<!-- <head> : 화면에 '안 보이는' 설정 구역 (제목, 문자 인코딩 등).
     Unity로 치면 씬에 배치되진 않지만 프로젝트 설정 같은 메타 정보 -->
<head>
  <!-- charset="UTF-8" : 한글이 깨지지 않게 하는 문자 규칙. 거의 항상 이 줄을 넣는다 -->
  <meta charset="UTF-8">
  <!-- <title> : 브라우저 '탭'에 뜨는 이름 (페이지 안 내용 아님) -->
  <title>week14 연습장</title>
</head>

<!-- <body> : 화면에 '실제로 보이는' 모든 것이 들어가는 구역 -->
<body>

  <!-- <h1> : 가장 큰 제목 (heading 1). h1~h6 까지 있고 숫자가 클수록 작아짐 -->
  <h1>내 첫 연습 페이지</h1>

  <!-- <p> : 한 문단(paragraph)의 글 -->
  <p>이 줄은 문단입니다. 지금은 아무 꾸밈이 없어서 밋밋해요.</p>

  <!-- <button> : 눌리는 버튼. 지금은 눌러도 아무 일도 안 일어남
       (동작을 담당하는 JS를 아직 안 붙였기 때문) -->
  <button>눌러보기</button>

</body>
</html>
